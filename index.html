
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>on se voit ?</title>
  <meta name="description" content="Les plannings d'adulte c'est compliqué." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0E0E0E; min-height: 100%; font-family: 'Inter', sans-serif; color: #E8E4DE; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }
    input, textarea { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0E0E0E; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; }

    #app { display: flex; justify-content: center; padding: 32px 16px 64px; min-height: 100vh; }
    .wrap { width: 100%; max-width: 400px; }

    .card { background: #141414; border: 1px solid #1E1E1E; border-radius: 16px; padding: 28px 24px; }
    .hero { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 48px; color: #E8E4DE; line-height: 1; margin-bottom: 12px; font-style: italic; letter-spacing: -0.01em; }
    .tagline { color: #666; font-size: 13px; letter-spacing: 0.03em; line-height: 1.6; margin-bottom: 32px; }
    .card-title { font-family: 'Cormorant Garamond', serif; font-weight: 400; font-size: 26px; color: #E8E4DE; margin-bottom: 20px; }
    .section-title { font-size: 11px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; font-weight: 500; margin-top: 20px; }
    .label { display: block; font-size: 11px; color: #666; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; margin-top: 16px; }
    .hint { font-size: 12px; color: #555; margin-bottom: 10px; }

    .input { width: 100%; background: #1A1A1A; border: 1px solid #242424; border-radius: 10px; padding: 12px 14px; color: #E8E4DE; font-size: 14px; transition: border-color 0.2s; }
    .input:focus { outline: none; border-color: #C4877A44; }
    textarea.input { resize: none; height: 68px; }

    .btn { width: 100%; background: #C4877A; color: #0E0E0E; border: none; border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 500; letter-spacing: 0.02em; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-secondary { width: 100%; background: transparent; color: #888; border: 1px solid #222; border-radius: 10px; padding: 16px; font-size: 15px; }
    .btn-back { background: none; border: none; color: #555; font-size: 12px; padding: 0; margin-bottom: 20px; display: block; letter-spacing: 0.03em; }

    .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .nav-btn { background: none; border: 1px solid #242424; color: #888; border-radius: 8px; width: 32px; height: 32px; font-size: 18px; line-height: 1; }
    .month-label { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: #E8E4DE; text-transform: capitalize; letter-spacing: 0.04em; }

    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-head { text-align: center; font-size: 10px; color: #555; padding: 4px 0; letter-spacing: 0.08em; }
    .day-cell { border-radius: 8px; padding: 8px 0; font-size: 13px; text-align: center; background: #1E1E1E; color: #E8E4DE; border: 1px solid #2A2A2A; transition: all 0.15s; }
    .day-cell:disabled { color: #333; cursor: default; background: #181818; border-color: #1A1A1A; }
    .day-cell.selected { background: #C4877A; color: #0E0E0E; border-color: #C4877A; }

    .date-tag { display: inline-block; background: #C4877A22; color: #C4877A; border: 1px solid #C4877A44; border-radius: 20px; padding: 4px 10px; font-size: 11px; margin-right: 6px; margin-top: 6px; }
    .date-tags { margin-top: 6px; margin-bottom: 12px; }

    .divider { border-top: 1px solid #1E1E1E; margin-top: 20px; margin-bottom: 4px; }

    .tag-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .tag-add-btn { background: #222; color: #444; border: none; border-radius: 10px; padding: 0 16px; font-size: 18px; flex-shrink: 0; transition: all 0.15s; }
    .tag-add-btn.active { background: #C4877A; color: #0E0E0E; }
    .tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag-chip { display: inline-flex; align-items: center; gap: 6px; background: #1E1E1E; border: 1px solid #2A2A2A; border-radius: 20px; padding: 4px 10px 4px 12px; font-size: 12px; color: #C4877A; }
    .tag-remove { background: none; border: none; color: #555; font-size: 14px; line-height: 1; padding: 0; }

    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
    .chip { background: transparent; border: 1px solid #2A2A2A; border-radius: 20px; padding: 7px 14px; font-size: 13px; color: #888; transition: all 0.15s; }
    .chip.selected { background: #C4877A22; border-color: #C4877A; color: #C4877A; }

    .date-choice { background: transparent; border: 1px solid #2A2A2A; border-radius: 10px; padding: 13px 16px; text-align: left; font-size: 13px; width: 100%; display: flex; align-items: center; transition: all 0.15s; color: #E8E4DE; margin-bottom: 8px; }
    .date-choice.selected { background: #C4877A22; border-color: #C4877A; color: #C4877A; }
    .date-choice .check { margin-right: 10px; font-size: 14px; }

    .code-block { background: #181818; border: 1px solid #2A2A2A; border-radius: 12px; padding: 24px; text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 40px; color: #E8E4DE; letter-spacing: 0.25em; margin-bottom: 16px; }
    .code-input { text-align: center; letter-spacing: 0.3em; font-size: 22px; font-family: 'Cormorant Garamond', serif; }
    .error-msg { color: #C4877A; font-size: 12px; margin-top: 4px; margin-bottom: 4px; }

    .event-row { background: #181818; border: 1px solid #1E1E1E; border-radius: 10px; padding: 14px 16px; text-align: left; width: 100%; margin-bottom: 12px; transition: border-color 0.15s; color: #E8E4DE; }
    .event-row:hover { border-color: #2A2A2A; }
    .event-row-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; }
    .event-row-meta { font-size: 12px; color: #666; margin-top: 6px; }
    .event-row-code { font-size: 11px; color: #555; font-family: monospace; letter-spacing: 0.1em; }

    .result-row { background: #181818; border-radius: 8px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid #222; }
    .result-row.top { background: #C4877A22; border-color: #C4877A55; }
    .result-row .label-text { font-size: 13px; color: #999; }
    .result-row.top .label-text { color: #C4877A; }
    .result-row .count { font-size: 13px; color: #555; }
    .result-row.top .count { color: #C4877A; }

    .response-card { background: #181818; border: 1px solid #222; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .response-name { font-size: 13px; color: #E8E4DE; margin-bottom: 6px; }
    .response-detail { font-size: 11px; color: #666; padding-left: 8px; margin-top: 2px; }
    .response-detail.meta { color: #555; }

    .success-icon { font-size: 32px; margin-bottom: 16px; }
    .success-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; color: #E8E4DE; margin-bottom: 8px; }
    .success-text { color: #888; font-size: 14px; line-height: 1.6; }
    .success-center { text-align: center; padding: 24px 0; }

    .share-hint { font-size: 11px; color: #3A3A3A; margin-top: 8px; text-align: center; }
    .flex-between { display: flex; justify-content: space-between; align-items: flex-start; }
    .responses-count { color: #666; font-size: 12px; margin-bottom: 24px; }
    .empty-state { color: #444; font-size: 13px; font-style: italic; }
    .mt8 { margin-top: 8px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .mt24 { margin-top: 24px; }
    .mb16 { margin-bottom: 16px; }
    .mb20 { margin-bottom: 20px; }
    .mb24 { margin-bottom: 24px; }
    .history-link { background: none; border: none; color: #555; font-size: 12px; padding: 0; letter-spacing: 0.03em; margin-top: 4px; }
    .btns-col { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
    .italic { font-style: italic; }
    .mono { font-family: monospace; }
  </style>
</head>
<body>
<div id="app"><div class="wrap" id="root"></div></div>

<script>
const STORAGE_KEY = "dispo_events_v2";

function loadEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
}
function saveEvents(e) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); } catch {}
}
function generateCode() {
  return Math.random().toString(36).substring(2, 7).toUpperCase();
}
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
}
function toISO(y, m, d) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}
function getDaysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }
function el(tag, props, ...children) {
  const e = document.createElement(tag);
  if (props) Object.entries(props).forEach(([k, v]) => {
    if (k === "class") e.className = v;
    else if (k === "style") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => { if (c != null) e.append(typeof c === "string" ? c : c); });
  return e;
}
function div(cls, ...children) { return el("div", { class: cls }, ...children); }
function btn(cls, text, onClick, disabled) {
  const b = el("button", { class: cls }, text);
  if (onClick) b.addEventListener("click", onClick);
  if (disabled) b.disabled = true;
  return b;
}

// ── State ────────────────────────────────────────────────────────────────
let state = { view: "home", createdEvent: null, selectedEvent: null };
function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  const views = { home: HomeView, create: CreateView, code: CodeView, respond: RespondView, history: HistoryView, detail: DetailView };
  root.appendChild((views[state.view] || HomeView)());
}
function navigate(view, extra) { state = { ...state, view, ...extra }; render(); }

// ── Calendar ─────────────────────────────────────────────────────────────
function Calendar(selected, onChange) {
  const today = new Date();
  let year = today.getFullYear(), month = today.getMonth();
  const min = toISO(today.getFullYear(), today.getMonth(), today.getDate());

  const wrap = div("", );
  function draw() {
    wrap.innerHTML = "";
    const monthLabel = new Date(year, month).toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
    const navRow = div("nav-row");
    const prevBtn = btn("nav-btn", "‹", () => { if (month === 0) { year--; month = 11; } else month--; draw(); });
    const nextBtn = btn("nav-btn", "›", () => { if (month === 11) { year++; month = 0; } else month++; draw(); });
    navRow.append(prevBtn, el("span", { class: "month-label" }, monthLabel), nextBtn);
    wrap.appendChild(navRow);

    const grid = div("cal-grid");
    ["Lu","Ma","Me","Je","Ve","Sa","Di"].forEach(d => grid.appendChild(el("div", { class: "cal-head" }, d)));

    const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
    for (let i = 0; i < firstDay; i++) grid.appendChild(div(""));
    const days = getDaysInMonth(year, month);
    for (let d = 1; d <= days; d++) {
      const iso = toISO(year, month, d);
      const isPast = iso < min;
      const isSel = selected.includes(iso);
      const cell = btn("day-cell" + (isSel ? " selected" : ""), String(d));
      if (isPast) cell.disabled = true;
      else cell.addEventListener("click", () => {
        if (selected.includes(iso)) selected = selected.filter(x => x !== iso);
        else selected = [...selected, iso].sort();
        onChange(selected);
        draw();
      });
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
  }
  draw();
  return wrap;
}

// ── TagInput ──────────────────────────────────────────────────────────────
function TagInput(values, onChange, placeholder, maxItems) {
  maxItems = maxItems || 5;
  const wrap = div("");
  function draw() {
    wrap.innerHTML = "";
    const row = div("tag-row");
    const inp = el("input", { class: "input", placeholder, maxlength: "50", style: { flex: "1", marginBottom: "0" } });
    const addBtn = btn("tag-add-btn" + (inp.value.trim() && values.length < maxItems ? " active" : ""), "+");
    const doAdd = () => {
      const v = inp.value.trim();
      if (!v || values.includes(v) || values.length >= maxItems) return;
      values = [...values, v]; onChange(values); inp.value = ""; draw();
    };
    inp.addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); doAdd(); } });
    inp.addEventListener("input", () => { addBtn.className = "tag-add-btn" + (inp.value.trim() && values.length < maxItems ? " active" : ""); });
    addBtn.addEventListener("click", doAdd);
    row.append(inp, addBtn);
    wrap.appendChild(row);
    if (values.length > 0) {
      const chips = div("tag-chips");
      values.forEach(v => {
        const chip = el("span", { class: "tag-chip" }, v);
        const rm = btn("tag-remove", "×", () => { values = values.filter(x => x !== v); onChange(values); draw(); });
        chip.appendChild(rm);
        chips.appendChild(chip);
      });
      wrap.appendChild(chips);
    }
  }
  draw();
  return { el: wrap, get: () => values };
}

// ── ChipSelect ────────────────────────────────────────────────────────────
function ChipSelect(options, value, onChange) {
  const wrap = div("");
  let showOther = value && !options.includes(value);
  function draw() {
    wrap.innerHTML = "";
    const group = div("chip-group");
    options.forEach(o => {
      const c = btn("chip" + (value === o ? " selected" : ""), o, () => { value = o; showOther = false; onChange(value); draw(); });
      group.appendChild(c);
    });
    const otherBtn = btn("chip" + ((showOther || (value && !options.includes(value))) ? " selected" : ""), "autre…", () => {
      showOther = !showOther; if (showOther) { value = ""; onChange(""); } draw();
    });
    group.appendChild(otherBtn);
    wrap.appendChild(group);
    if (showOther || (value && !options.includes(value))) {
      const inp = el("input", { class: "input", placeholder: "Précise ici…", maxlength: "60", style: { marginTop: "6px" } });
      inp.value = (!options.includes(value) && value) ? value : "";
      inp.addEventListener("input", () => { value = inp.value; onChange(value); });
      wrap.appendChild(inp);
      setTimeout(() => inp.focus(), 50);
    }
  }
  draw();
  return wrap;
}

// ── Views ─────────────────────────────────────────────────────────────────
function HomeView() {
  const count = loadEvents().length;
  const card = div("card", div(""), );
  card.style.textAlign = "center";
  const hero = el("h1", { class: "hero" }, "on se voit ?");
  const tag = el("p", { class: "tagline" }, "Les plannings d'adulte c'est compliqué.");
  const btnsCol = div("btns-col");
  const b1 = btn("btn", "Créer un événement", () => navigate("create"));
  b1.style.padding = "16px"; b1.style.fontSize = "15px";
  const b2 = btn("btn-secondary", "J'ai reçu un code", () => navigate("respond"));
  btnsCol.append(b1, b2);
  card.append(hero, tag, btnsCol);
  if (count > 0) {
    const hl = btn("history-link", `Mes événements (${count}) →`, () => navigate("history"));
    card.appendChild(hl);
  }
  return card;
}

function CreateView() {
  let selectedDates = [];
  let lieux = [];
  let activites = [];
  const card = div("card");
  card.appendChild(btn("btn-back", "← retour", () => navigate("home")));
  card.appendChild(el("h2", { class: "card-title" }, "Nouvel événement"));

  card.appendChild(el("label", { class: "label" }, "Un titre pour l'occasion"));
  const titleInp = el("input", { class: "input", placeholder: "ex. apéro juillet, ciné cette semaine…", maxlength: "60" });
  card.appendChild(titleInp);

  card.appendChild(el("label", { class: "label" }, "Un mot (optionnel)"));
  const noteInp = el("textarea", { class: "input", placeholder: "ex. ça fait longtemps, on s'organise ?", maxlength: "200" });
  card.appendChild(noteInp);

  card.appendChild(el("label", { class: "label" }, "Tes dispos"));
  const cal = Calendar(selectedDates, (d) => { selectedDates = d; updateTags(); updateBtn(); });
  card.appendChild(cal);

  const tagsWrap = div("date-tags");
  card.appendChild(tagsWrap);

  function updateTags() {
    tagsWrap.innerHTML = "";
    selectedDates.forEach(d => tagsWrap.appendChild(el("span", { class: "date-tag" }, formatDate(d))));
  }

  card.appendChild(div("divider"));
  card.appendChild(el("label", { class: "label" }, "Lieux possibles ", el("span", { style: { color: "#444", textTransform: "none", letterSpacing: "0" } }, "(optionnel)")));
  card.appendChild(el("p", { class: "hint" }, "Ajoute des idées — tes potes choisiront. Entrée ou +"));
  const lieuTag = TagInput(lieux, (v) => { lieux = v; }, "ex. chez moi, le café du Théâtre…", 5);
  card.appendChild(lieuTag.el);

  card.appendChild(div("divider"));
  card.appendChild(el("label", { class: "label" }, "Activités possibles ", el("span", { style: { color: "#444", textTransform: "none", letterSpacing: "0" } }, "(optionnel)")));
  card.appendChild(el("p", { class: "hint" }, "Idem — ils votent pour ce qu'ils préfèrent."));
  const actTag = TagInput(activites, (v) => { activites = v; }, "ex. ciné, balade, apéro…", 5);
  card.appendChild(actTag.el);

  const createBtn = btn("btn", "Générer le code →", () => {
    const title = titleInp.value.trim();
    if (!title || selectedDates.length === 0) return;
    const code = generateCode();
    const event = { id: code, title, note: noteInp.value.trim(), dates: selectedDates, lieux: lieuTag.get(), activites: actTag.get(), responses: [], createdAt: new Date().toISOString() };
    const events = loadEvents(); events.push(event); saveEvents(events);
    navigate("code", { createdEvent: event });
  });
  createBtn.style.marginTop = "24px";
  createBtn.disabled = true;

  function updateBtn() { createBtn.disabled = !(titleInp.value.trim() && selectedDates.length > 0); }
  titleInp.addEventListener("input", updateBtn);
  card.appendChild(createBtn);
  return card;
}

function CodeView() {
  const event = state.createdEvent;
  const card = div("card");
  card.appendChild(btn("btn-back", "← retour", () => navigate("home")));
  card.appendChild(el("h2", { class: "card-title" }, event.title));
  card.appendChild(el("p", { style: { color: "#888", fontSize: "13px", marginBottom: "24px" } }, "Envoie ce code à tes potes."));
  card.appendChild(div("code-block", event.id));
  const shareText = `Salut ! Je veux qu'on se voit — utilise ce code pour choisir une date : ${event.id}`;
  let copied = false;
  const copyBtn = btn("btn", "Copier le message", () => {
    navigator.clipboard?.writeText(shareText).then(() => { copyBtn.textContent = "Copié ✓"; setTimeout(() => copyBtn.textContent = "Copier le message", 2000); });
  });
  card.append(copyBtn, el("p", { class: "share-hint" }, `"${shareText}"`));
  return card;
}

function RespondView() {
  let foundEvent = null;
  let chosenDates = [], chosenLieu = "", chosenActivite = "";

  const card = div("card");
  card.appendChild(btn("btn-back", "← retour", () => navigate("home")));

  function showCodeEntry() {
    card.innerHTML = "";
    card.appendChild(btn("btn-back", "← retour", () => navigate("home")));
    card.appendChild(el("h2", { class: "card-title" }, "Entrer un code"));
    card.appendChild(el("p", { style: { color: "#888", fontSize: "13px", marginBottom: "20px" } }, "Tu as reçu un code à 5 lettres ? Saisis-le ici."));
    const codeInp = el("input", { class: "input code-input", placeholder: "XXXXX", maxlength: "5" });
    codeInp.addEventListener("input", () => { codeInp.value = codeInp.value.toUpperCase(); findBtn.disabled = codeInp.value.length < 5; });
    card.appendChild(codeInp);
    const errMsg = el("p", { class: "error-msg", style: { display: "none" } });
    card.appendChild(errMsg);
    const findBtn = btn("btn", "Voir les dispos →", () => {
      const events = loadEvents();
      foundEvent = events.find(e => e.id === codeInp.value.trim());
      if (foundEvent) showForm();
      else { errMsg.textContent = "Code introuvable. Vérifie avec la personne qui t'a envoyé ça."; errMsg.style.display = "block"; }
    });
    findBtn.disabled = true;
    card.appendChild(findBtn);
  }

  function showForm() {
    card.innerHTML = "";
    card.appendChild(btn("btn-back", "← changer de code", () => showCodeEntry()));
    card.appendChild(el("h2", { class: "card-title" }, foundEvent.title));
    if (foundEvent.note) card.appendChild(el("p", { style: { color: "#999", fontSize: "13px", marginBottom: "20px", fontStyle: "italic" } }, `"${foundEvent.note}"`));

    card.appendChild(el("label", { class: "label" }, "Ton prénom"));
    const nameInp = el("input", { class: "input", placeholder: "Comment tu t'appelles ?", maxlength: "40" });
    card.appendChild(nameInp);

    card.appendChild(el("label", { class: "label" }, "Les dates qui t'arrangent"));
    card.appendChild(el("p", { class: "hint" }, "Coche tout ce qui te convient."));
    foundEvent.dates.forEach(d => {
      const dc = btn("date-choice" + (chosenDates.includes(d) ? " selected" : ""), "");
      const check = el("span", { class: "check" }, chosenDates.includes(d) ? "✓" : "○");
      dc.append(check, formatDate(d));
      dc.addEventListener("click", () => {
        if (chosenDates.includes(d)) chosenDates = chosenDates.filter(x => x !== d);
        else chosenDates = [...chosenDates, d];
        check.textContent = chosenDates.includes(d) ? "✓" : "○";
        dc.className = "date-choice" + (chosenDates.includes(d) ? " selected" : "");
        updateSubmit();
      });
      card.appendChild(dc);
    });

    let lieuChipWrap = null, actChipWrap = null;
    if (foundEvent.lieux && foundEvent.lieux.length > 0) {
      card.appendChild(div("divider"));
      card.appendChild(el("label", { class: "label" }, "Lieu"));
      card.appendChild(el("p", { class: "hint" }, "Où tu préfères ?"));
      lieuChipWrap = div("");
      const lieuChip = ChipSelect(foundEvent.lieux, chosenLieu, v => { chosenLieu = v; });
      lieuChipWrap.appendChild(lieuChip);
      card.appendChild(lieuChipWrap);
    }
    if (foundEvent.activites && foundEvent.activites.length > 0) {
      card.appendChild(div("divider"));
      card.appendChild(el("label", { class: "label" }, "Activité"));
      card.appendChild(el("p", { class: "hint" }, "Qu'est-ce qui te tente ?"));
      const actChip = ChipSelect(foundEvent.activites, chosenActivite, v => { chosenActivite = v; });
      card.appendChild(actChip);
    }

    const submitBtn = btn("btn", "Envoyer →", () => {
      const name = nameInp.value.trim();
      if (!name || chosenDates.length === 0) return;
      const events = loadEvents();
      const idx = events.findIndex(e => e.id === foundEvent.id);
      if (idx !== -1) {
        events[idx].responses.push({ name, dates: chosenDates, lieu: chosenLieu, activite: chosenActivite, at: new Date().toISOString() });
        saveEvents(events);
        showSuccess(name);
      }
    });
    submitBtn.disabled = true;
    submitBtn.style.marginTop = "20px";
    card.appendChild(submitBtn);

    function updateSubmit() { submitBtn.disabled = !(nameInp.value.trim() && chosenDates.length > 0); }
    nameInp.addEventListener("input", updateSubmit);
  }

  function showSuccess(name) {
    card.innerHTML = "";
    const center = div("success-center");
    center.appendChild(div("success-icon", "🖤"));
    center.appendChild(el("h2", { class: "success-title" }, "C'est noté !"));
    center.appendChild(el("p", { class: "success-text" }, `${name}, tes réponses ont été envoyées. On va se voir bientôt.`));
    card.appendChild(center);
    const b = btn("btn", "← accueil", () => navigate("home"));
    b.style.marginTop = "24px";
    card.appendChild(b);
  }

  showCodeEntry();
  return card;
}

function HistoryView() {
  const events = loadEvents().reverse();
  const card = div("card");
  card.appendChild(btn("btn-back", "← retour", () => navigate("home")));
  if (events.length === 0) {
    card.appendChild(el("p", { class: "empty-state", style: { textAlign: "center", padding: "32px 0" } }, "Aucun événement pour l'instant."));
    return card;
  }
  card.appendChild(el("h2", { class: "card-title" }, "Mes événements"));
  events.forEach(e => {
    const row = btn("event-row", "");
    const top = div("flex-between");
    top.appendChild(el("span", { class: "event-row-title" }, e.title));
    top.appendChild(el("span", { class: "event-row-code" }, e.id));
    row.appendChild(top);
    row.appendChild(el("div", { class: "event-row-meta" }, `${e.dates.length} date${e.dates.length>1?"s":""} · ${e.responses.length} réponse${e.responses.length!==1?"s":""}`));
    row.addEventListener("click", () => navigate("detail", { selectedEvent: e }));
    card.appendChild(row);
  });
  return card;
}

function DetailView() {
  const events = loadEvents();
  const event = events.find(e => e.id === state.selectedEvent.id) || state.selectedEvent;

  const dateCounts = {};
  event.dates.forEach(d => { dateCounts[d] = 0; });
  event.responses.forEach(r => r.dates.forEach(d => { if (dateCounts[d] !== undefined) dateCounts[d]++; }));
  const maxCount = Math.max(...Object.values(dateCounts), 0);

  const lieuCounts = {}, actCounts = {};
  event.responses.forEach(r => {
    if (r.lieu) lieuCounts[r.lieu] = (lieuCounts[r.lieu] || 0) + 1;
    if (r.activite) actCounts[r.activite] = (actCounts[r.activite] || 0) + 1;
  });
  const maxLieu = Math.max(...Object.values(lieuCounts), 0);
  const maxAct = Math.max(...Object.values(actCounts), 0);

  const card = div("card");
  card.appendChild(btn("btn-back", "← retour", () => navigate("history")));
  const topRow = div("flex-between");
  topRow.appendChild(el("h2", { class: "card-title", style: { marginBottom: "0" } }, event.title));
  topRow.appendChild(el("span", { class: "event-row-code", style: { paddingTop: "4px" } }, event.id));
  card.appendChild(topRow);
  card.appendChild(el("p", { class: "responses-count" }, `${event.responses.length} réponse${event.responses.length!==1?"s":""}`));

  if (event.responses.length === 0) {
    card.appendChild(el("p", { class: "empty-state" }, "Personne n'a encore répondu."));
    return card;
  }

  function resultSection(title, items, maxVal, total) {
    card.appendChild(el("h3", { class: "section-title" }, title));
    items.forEach(([label, count]) => {
      const isTop = count === maxVal && maxVal > 0;
      const row = div("result-row" + (isTop ? " top" : ""));
      row.appendChild(el("span", { class: "label-text" }, label));
      row.appendChild(el("span", { class: "count" }, total !== undefined ? `${count} / ${total}` : String(count)));
      card.appendChild(row);
    });
  }

  resultSection("Dates", event.dates.map(d => [formatDate(d), dateCounts[d]]), maxCount, event.responses.length);
  if (Object.keys(lieuCounts).length > 0) resultSection("Lieux", Object.entries(lieuCounts).sort((a,b)=>b[1]-a[1]), maxLieu, undefined);
  if (Object.keys(actCounts).length > 0) resultSection("Activités", Object.entries(actCounts).sort((a,b)=>b[1]-a[1]), maxAct, undefined);

  card.appendChild(el("h3", { class: "section-title", style: { marginTop: "20px" } }, "Réponses individuelles"));
  event.responses.forEach(r => {
    const rc = div("response-card");
    rc.appendChild(el("div", { class: "response-name" }, r.name));
    r.dates.forEach(d => rc.appendChild(el("div", { class: "response-detail" }, `· ${formatDate(d)}`)));
    if (r.lieu) rc.appendChild(el("div", { class: "response-detail meta" }, `📍 ${r.lieu}`));
    if (r.activite) rc.appendChild(el("div", { class: "response-detail meta" }, `✦ ${r.activite}`));
    card.appendChild(rc);
  });

  return card;
}

render();
</script>
</body>
</html>
